<?xml version="1.0" encoding="UTF-8"?>
<!--
  ClaudeBackup app icon — CB monogram on purple-blue gradient.
  Matches the dark theme palette (primary_a=#8B7FFF, primary_b=#5B6FFF).
  Designed to read clearly down to 16x16.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="50%"  stop-color="#8B7FFF"/>
      <stop offset="100%" stop-color="#5B6FFF"/>
    </linearGradient>
    <linearGradient id="inner-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bg)"/>
  <!-- top inner highlight for depth -->
  <rect x="8" y="8" width="240" height="120" rx="56" ry="56" fill="url(#inner-shadow)"/>

  <!-- C — open-circle stroke -->
  <path d="
      M 116 86
      A 42 42 0 1 0 116 170
    "
    fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>

  <!-- B — stylized two-bump letter -->
  <path d="
      M 140 80
      L 140 176
      L 178 176
      A 26 26 0 0 0 178 124
      L 152 124
      M 152 124
      L 174 124
      A 22 22 0 0 0 174 80
      L 140 80
      Z
    "
    fill="#FFFFFF"/>

  <!-- small backup-archive dot to hint "snapshot" — subtle, 32px+ only -->
  <circle cx="200" cy="200" r="10" fill="#34D399" opacity="0.95"/>
  <circle cx="200" cy="200" r="5"  fill="#FFFFFF"/>
</svg>
